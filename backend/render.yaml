services:
  - type: web
    name: hcp-crm-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: hcp-crm-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: hcp-crm-db
    databaseName: hcp_crm
    user: hcp_user
    plan: free